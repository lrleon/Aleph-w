name: CI Platform

# Phase 16 of the cellular-automata industrial roadmap:
# multi-platform build matrix (macOS, ARM64 Linux, Windows) plus a
# weekly slot for the heavier Windows toolchain combinations.
#
# Strategy:
#   * macOS and ARM64-Linux are cheap enough to run on every push/PR.
#   * Windows runs on a `workflow_dispatch` trigger plus a weekly cron,
#     because the MSVC and clang-cl matrix builds + dependency setup
#     dominate the runner budget. Push events on `master` also fire it
#     so the badge stays current on the main branch.
#   * The CA test sub-suite excludes ca_animation_sinks_test on Windows
#     (depends on libX11 + an external ffmpeg process) — see
#     docs/ci_sanitizer_policy.md for the full per-platform skip list.

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  schedule:
    # Mondays 04:30 UTC: weekly Windows full sweep.
    - cron: '30 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: build-macos (${{ matrix.os }}, AppleClang, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel = Intel x86_64; macos-15 = Apple Silicon arm64.
        # macos-13 (Ventura) was retired from GitHub-hosted runners; macos-14
        # remains available but macos-15 is now the latest supported image.
        os: [macos-15-intel, macos-15]
        build_type: [Debug, Release]

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: |
          set -euo pipefail
          brew update
          brew install \
            cmake ninja ccache \
            gmp mpfr gsl googletest \
            tclap

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ matrix.os }}-${{ matrix.build_type }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-${{ matrix.build_type }}-ccache-
            ${{ runner.os }}-${{ matrix.os }}-ccache-

      - name: Configure
        run: |
          set -euo pipefail
          BREW_PREFIX="$(brew --prefix)"
          rm -rf build
          # AppleClang + libc++ is the platform default; no -stdlib= override.
          # X11 viewer is disabled (no XQuartz on the GitHub-hosted runner).
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=ON \
            -DALEPH_BUILD_X11_VIEWER=OFF \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX}"

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Test (CA + core suite, skip X11/ffmpeg)
        run: |
          mkdir -p build/test_artifacts/golden_svg
          export ALEPH_TEST_GOLDEN_DIR="$PWD/build/test_artifacts/golden_svg"
          # Skip:
          #   - hash_statistical_test: long-running statistical sweep.
          #   - ca_animation_sinks_test: requires X11 + external ffmpeg.
          ctest --test-dir build --output-on-failure --parallel 2 --timeout 600 \
            -E 'hash_statistical_test|ca_animation_sinks_test'

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.os }}-${{ matrix.build_type }}
          if-no-files-found: ignore
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt

  build-arm64-linux:
    name: build-arm64-linux (ubuntu-24.04-arm, ${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config ccache \
            libgmp-dev libmpfr-dev libgsl-dev \
            libx11-dev libpthread-stubs0-dev \
            libtclap-dev \
            libgtest-dev \
            ruby-full

      - name: Install GCC toolchain
        if: matrix.compiler == 'gcc'
        run: sudo apt-get install -y g++

      - name: Install Clang toolchain
        if: matrix.compiler == 'clang'
        run: sudo apt-get install -y clang libc++-dev libc++abi-dev

      - name: Configure compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "CXXFLAGS_STDLIB=-stdlib=libc++" >> "$GITHUB_ENV"
            echo "LDFLAGS_STDLIB=-lc++abi" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
            echo "CXXFLAGS_STDLIB=" >> "$GITHUB_ENV"
            echo "LDFLAGS_STDLIB=" >> "$GITHUB_ENV"
          fi

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-arm64-${{ matrix.compiler }}-${{ matrix.build_type }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-arm64-${{ matrix.compiler }}-${{ matrix.build_type }}-ccache-
            ${{ runner.os }}-arm64-${{ matrix.compiler }}-ccache-

      - name: Build and install GoogleTest (Clang + libc++ only)
        if: matrix.compiler == 'clang'
        run: |
          set -euo pipefail
          if [ -d /usr/src/googletest ]; then
            GTEST_SRC=/usr/src/googletest
          elif [ -d /usr/src/gtest ]; then
            GTEST_SRC=/usr/src/gtest
          else
            echo "No googletest sources found"
            exit 1
          fi
          sudo rm -rf "$GTEST_SRC/build" 2>/dev/null || true
          sudo cmake -S "$GTEST_SRC" -B "$GTEST_SRC/build" -G Ninja \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_CXX_FLAGS="${CXXFLAGS_STDLIB}" \
            -DCMAKE_EXE_LINKER_FLAGS="${LDFLAGS_STDLIB}"
          sudo cmake --build "$GTEST_SRC/build"
          sudo cmake --install "$GTEST_SRC/build"

      - name: Configure
        run: |
          rm -rf build
          EXTRA_LINKER_FLAGS=""
          EXTRA_CXX_FLAGS=""
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            EXTRA_LINKER_FLAGS="${LDFLAGS_STDLIB}"
            EXTRA_CXX_FLAGS="${CXXFLAGS_STDLIB}"
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_CXX_FLAGS="$EXTRA_CXX_FLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="$EXTRA_LINKER_FLAGS" \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=ON

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Test
        run: |
          mkdir -p build/test_artifacts/golden_svg
          export ALEPH_TEST_GOLDEN_DIR="$PWD/build/test_artifacts/golden_svg"
          ctest --test-dir build --output-on-failure --parallel 2 --timeout 600 \
            -E 'hash_statistical_test'

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-arm64-${{ matrix.compiler }}-${{ matrix.build_type }}
          if-no-files-found: ignore
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt

  build-windows:
    name: build-windows (${{ matrix.toolchain }}, ${{ matrix.build_type }})
    # Costly job: only on master push, dispatch, or the weekly cron.
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: windows-2022
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        # The roadmap calls for the windows-2022 x {msvc, clang-cl} matrix.
        # Both toolchains consume the MSYS2 mingw64 toolchain's gmp/mpfr/gsl
        # build (vcpkg is also wired in case MSYS2 vendoring drifts).
        toolchain: [msvc, clang-cl]
        build_type: [Release]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      SCCACHE_GHA_ENABLED: "true"
      # Fall back to plain compilation instead of failing the build when the
      # GitHub Actions cache service is unavailable.
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 (for gmp / mpfr / gsl headers + libs)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-gsl
            mingw-w64-x86_64-pkg-config

      - name: Install ninja
        run: |
          choco install -y ninja

      - name: Enable sccache
        # v0.0.6 only wires up the legacy GHA cache v1 endpoint, which GitHub
        # shut down in 2025 (permanent HTTP 400 from artifactcache.*).
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up MSVC environment
        if: matrix.toolchain == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Clang-cl environment
        if: matrix.toolchain == 'clang-cl'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (msvc)
        if: matrix.toolchain == 'msvc'
        shell: cmd
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_PREFIX_PATH=%RUNNER_TEMP%\msys64\mingw64 ^
            -DBUILD_EXAMPLES=OFF ^
            -DBUILD_TESTS=ON ^
            -DALEPH_BUILD_X11_VIEWER=OFF

      - name: Configure (clang-cl)
        if: matrix.toolchain == 'clang-cl'
        shell: cmd
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
            -DCMAKE_C_COMPILER=clang-cl ^
            -DCMAKE_CXX_COMPILER=clang-cl ^
            -DCMAKE_C_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ^
            -DCMAKE_PREFIX_PATH=%RUNNER_TEMP%\msys64\mingw64 ^
            -DBUILD_EXAMPLES=OFF ^
            -DBUILD_TESTS=ON ^
            -DALEPH_BUILD_X11_VIEWER=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test (CA sub-suite, skip POSIX-only tests)
        shell: pwsh
        run: |
          # Add MSYS2 mingw64 bin to PATH so that test executables can find
          # the GMP/MPFR/GSL DLLs (libgmp-10.dll, libmpfr-6.dll, etc.) at
          # runtime.  Without this the executables crash on load and
          # LastTest.log remains empty.
          $env:PATH = "$env:RUNNER_TEMP\msys64\mingw64\bin;$env:PATH"
          # Per docs/ci_sanitizer_policy.md, the following are skipped on
          # Windows because they bind to libX11, an external `ffmpeg`
          # process, or POSIX-only system calls (sys/wait, sys/select).
          ctest --test-dir build --output-on-failure --parallel 2 --timeout 600 `
            -E 'hash_statistical_test|ca_animation_sinks_test|file_b_tree_test|file_bplus_tree_test|timeoutQueue_test|PlanarityTest\.External|PlanarityTest\.ExternalGephi|CompilerSdk\.InstallHeadersSmoke|ThreadPoolTest\.BenchmarkVsStdAsync'

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-windows-${{ matrix.toolchain }}-${{ matrix.build_type }}
          if-no-files-found: ignore
          path: |
            build/Testing/Temporary/LastTest.log
            build/CMakeCache.txt

  ci-platform-success:
    name: CI Platform Success
    runs-on: ubuntu-24.04
    needs:
      - build-macos
      - build-arm64-linux
      - build-windows
    if: always()
    steps:
      - name: Check results
        run: |
          set -euo pipefail
          echo "build-macos result: ${{ needs.build-macos.result }}"
          echo "build-arm64-linux result: ${{ needs.build-arm64-linux.result }}"
          echo "build-windows result: ${{ needs.build-windows.result }}"

          is_ok() {
            [ "$1" = "success" ] || [ "$1" = "skipped" ]
          }

          all_ok=1
          check_job() {
            if ! is_ok "$2"; then
              echo "Job '$1' did not succeed (result: $2)"
              all_ok=0
            fi
          }

          check_job "build-macos" "${{ needs.build-macos.result }}"
          check_job "build-arm64-linux" "${{ needs.build-arm64-linux.result }}"
          check_job "build-windows" "${{ needs.build-windows.result }}"

          if [ "$all_ok" -ne 1 ]; then
            echo "CI platform matrix failed"
            exit 1
          fi
          echo "CI platform matrix passed"