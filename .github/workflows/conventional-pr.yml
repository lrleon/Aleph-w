# Gate: PR titles must follow Conventional Commits (roadmap phase 29).
#
# release-please derives versions and the CHANGELOG from commit messages
# on master. With squash merges the PR title becomes that commit message,
# so linting the title keeps the release automation reliable:
#   feat: ... -> minor   fix: ... -> patch   feat!: / BREAKING CHANGE -> major
name: conventional-pr

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}