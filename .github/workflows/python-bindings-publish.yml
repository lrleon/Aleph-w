name: python-bindings-publish

# Manual-trigger publication of the aleph-ca wheel to TestPyPI.
# Wheel publication is intentionally NOT automatic on release tags: every
# 4.x branch should be promoted to TestPyPI explicitly so we can sanity-
# check the artefact before turning the upload knob.
#
# Required secret: `TEST_PYPI_API_TOKEN` (TestPyPI API token with upload
# scope for the `aleph-ca` project). See:
#   https://test.pypi.org/help/#apitoken

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/SHA) to build from."
        required: true
        default: "master"

permissions:
  contents: read

jobs:
  build-wheels:
    name: cibuildwheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.21.3

      - name: Build wheels
        working-directory: python
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux* *-win* pp*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_BEFORE_BUILD_LINUX: >-
            yum install -y gmp-devel mpfr-devel gsl-devel ||
            apt-get update && apt-get install -y libgmp-dev libmpfr-dev libgsl-dev
          CIBW_BEFORE_BUILD_MACOS: >-
            brew install gmp mpfr gsl
          CIBW_TEST_REQUIRES: "pytest pytest-timeout numpy"
          CIBW_TEST_COMMAND: "pytest {project}/tests"
        run: |
          python -m cibuildwheel --output-dir dist
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aleph-ca-wheels-${{ matrix.os }}
          path: python/dist/*.whl
          retention-days: 30

  publish-test-pypi:
    name: publish to TestPyPI
    runs-on: ubuntu-24.04
    needs: build-wheels
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: aleph-ca-wheels-*
          merge-multiple: true
          path: dist/

      - name: List wheels to upload
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true