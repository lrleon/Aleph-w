name: python-bindings

# Phase 18 of the cellular-automata industrial roadmap.
#
# Builds the `aleph_ca` wheel from the in-tree `python/pyproject.toml`
# and runs the pytest suite. Wheel publication to TestPyPI is a separate,
# manually triggered workflow (`python-bindings-publish.yml`).

on:
  push:
    paths:
      - "python/**"
      - "tpl_ca_*.H"
      - "ca-*.H"
      - "CMakeLists.txt"
      - ".github/workflows/python-bindings.yml"
  pull_request:
    paths:
      - "python/**"
      - "tpl_ca_*.H"
      - "ca-*.H"
      - "CMakeLists.txt"
      - ".github/workflows/python-bindings.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev libgsl-dev \
            cmake ninja-build

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pytest-timeout numpy

      - name: Build wheel
        working-directory: python
        run: |
          python -m build --wheel --outdir dist/
          ls -la dist/

      - name: Install wheel
        run: |
          python -m pip install python/dist/aleph_ca-*.whl

      - name: Verify import
        run: |
          python -c "import aleph_ca; print(aleph_ca.__version__)"
          python -c "import aleph_ca; e = aleph_ca.make_game_of_life_engine(4, 4); e.step(); print(e.frame())"

      - name: Run pytest
        run: |
          pytest python/tests/ -v --tb=short

      - name: Upload wheel artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: aleph-ca-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/dist/*.whl
          retention-days: 14

  notebook-smoke:
    name: notebook smoke (jupytext -> execute)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev libgsl-dev \
            cmake ninja-build

      - name: Install build + notebook tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build numpy matplotlib jupytext nbclient ipykernel

      - name: Build + install wheel
        run: |
          python -m build --wheel --outdir python/dist/ python/
          python -m pip install python/dist/aleph_ca-*.whl

      - name: Convert and execute notebook
        run: |
          cd python/notebooks
          jupytext --to ipynb 01_intro.py
          jupyter execute 01_intro.ipynb || jupytext --execute 01_intro.ipynb