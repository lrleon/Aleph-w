name: Cellular Automata Reproductions

on:
  schedule:
    # Weekly on Sunday at 05:00 UTC.
    - cron: '0 5 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reproductions:
    name: reproductions (ubuntu-24.04, gcc, Release)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ gnuplot-nox \
            libgmp-dev libmpfr-dev libgsl-dev \
            libx11-dev libpthread-stubs0-dev

      - name: Configure
        run: |
          cmake -S . -B build-reproductions -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_REPRODUCTIONS=ON

      - name: Build
        run: |
          cmake --build build-reproductions --target ca_reproductions --parallel

      - name: Run quantitative reproductions
        run: |
          set -euo pipefail
          ./build-reproductions/reproductions/btw_sandpile
          ./build-reproductions/reproductions/schelling_segregation
          ./build-reproductions/reproductions/drossel_schwabl
          ./build-reproductions/reproductions/gray_scott_patterns
          ./build-reproductions/reproductions/game_of_life_bench
          (
            cd reproductions
            gnuplot plot_btw.gp
            gnuplot plot_drossel_schwabl.gp
          )

      - name: Upload reproduction artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cellular-automata-reproductions
          path: |
            reproductions/results
            reproductions/figures/generated
